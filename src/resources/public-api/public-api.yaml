- name: Animal
  categories:
    - name: Cat Information
      restfulEndpointGroups:
        - name: Cat Fact Ninja
          restfulEndpoints:
            - title: Cat Breeds
              url: https://catfact.ninja/breeds
              method: GET
              params:
                limit: "10"
              headers:
                Content-Type: application/json
              tags: [Animal, Cat]
              categories: [Animal, Cat]
            - title: Cat Facts
              url: https://catfact.ninja/facts
              method: GET
              params:
                max_length: ""
                limit: "10"
              headers:
                Content-Type: application/json
              tags: [Cat, Animal]
              categories: [Animal, Cat]
    - name: Dog Information
      restfulEndpointGroups:
        - name: Dog Breeds
          restfulEndpoints:
            - title: Dog Breeds
              url: https://dog.ceo/api/breeds/list/all
              method: GET
              headers:
                Content-Type: application/json
              tags: [Dog, Animal]
              categories: [Animal, Dog]
