<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img" aria-label="FlowDesk logo">
  <rect width="56" height="56" rx="8" fill="#0A0B0D"/>
  <!-- Vertical stem -->
  <rect x="7" y="4" width="5" height="48" rx="1.5" fill="#E8E6DF"/>
  <!-- K-line top arm: 4 ascending candles -->
  <line x1="18" y1="11" x2="18" y2="22" stroke="#E8E6DF" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="15.5" y="14" width="5" height="6" rx="0.5" fill="#E8E6DF"/>
  <line x1="27" y1="7" x2="27" y2="21" stroke="#E8E6DF" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="24.5" y="9" width="5" height="10" rx="0.5" fill="none" stroke="#E8E6DF" stroke-width="1.4"/>
  <line x1="36" y1="3" x2="36" y2="18" stroke="#FF8B3D" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="33.5" y="5" width="5" height="10" rx="0.5" fill="#FF8B3D"/>
  <line x1="45" y1="2" x2="45" y2="13" stroke="#FF8B3D" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="42.5" y="3" width="5" height="7" rx="0.5" fill="#FF8B3D"/>
